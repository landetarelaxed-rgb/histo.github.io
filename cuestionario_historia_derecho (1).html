<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario – Historia del Derecho en México</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: rgba(255,255,255,0.08);
    --accent: #c9a84c;
    --accent2: #e8c87a;
    --text: #e6edf3;
    --muted: #8b949e;
    --correct: #3fb950;
    --wrong: #f85149;
    --correct-bg: rgba(63,185,80,0.12);
    --wrong-bg: rgba(248,81,73,0.12);
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #0d1117 0%, #1a1000 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 60px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .badge {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    color: var(--muted);
    font-size: 15px;
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.6;
  }
  .meta-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .meta-val {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .meta-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* MAIN */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .question-card:hover { border-color: rgba(201,168,76,0.2); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
  }
  .q-num {
    flex-shrink: 0;
    width: 36px; height: 36px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .q-text {
    font-size: 15.5px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text);
    flex: 1;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }
  .option:hover:not(.disabled) {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.06);
  }
  .option.selected {
    border-color: rgba(201,168,76,0.5);
    background: rgba(201,168,76,0.1);
  }
  .option.correct {
    border-color: var(--correct) !important;
    background: var(--correct-bg) !important;
  }
  .option.wrong {
    border-color: var(--wrong) !important;
    background: var(--wrong-bg) !important;
  }
  .option.disabled { cursor: default; }

  .opt-letter {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.18s;
  }
  .option.selected .opt-letter {
    background: rgba(201,168,76,0.3);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .option.correct .opt-letter {
    background: rgba(63,185,80,0.3);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option.wrong .opt-letter {
    background: rgba(248,81,73,0.3);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
    padding-top: 3px;
  }

  /* FEEDBACK */
  .feedback {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.55;
  }
  .feedback.show { display: block; animation: fadeUp 0.2s ease; }
  .feedback.correct-fb {
    background: var(--correct-bg);
    border: 1px solid rgba(63,185,80,0.3);
    color: #7ee787;
  }
  .feedback.wrong-fb {
    background: var(--wrong-bg);
    border: 1px solid rgba(248,81,73,0.3);
    color: #ff7b72;
  }
  .feedback strong { font-weight: 600; }

  /* SUBMIT */
  .submit-wrap {
    text-align: center;
    margin: 40px 0 20px;
  }
  .btn-submit {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0d1117;
    border: none;
    padding: 16px 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(201,168,76,0.3);
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.4); }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* RESULTS */
  #results {
    display: none;
    background: var(--surface);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.5s ease;
  }
  #results.show { display: block; }
  .score-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }
  .score-ring::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) var(--pct, 0%), rgba(255,255,255,0.04) 0%);
  }
  .score-inner {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border-radius: 50%;
    width: 96px; height: 96px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .score-denom {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  #results h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }
  #results p { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .btn-retry {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    padding: 12px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-retry:hover { background: rgba(201,168,76,0.1); }

  @media (max-width: 520px) {
    .question-card { padding: 20px 16px; }
    .hero { padding: 40px 16px 36px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="badge">UAQROO · ACPDE-144 · Segundo Parcial</div>
  <h1>Historia del <span>Derecho</span><br>en México</h1>
  <p>30 preguntas de opción múltiple. Lee con cuidado — hay opciones diseñadas para confundir. ¡Buena suerte!</p>
  <div class="meta-row">
    <div class="meta-item"><span class="meta-val">30</span><span class="meta-label">Preguntas</span></div>
    <div class="meta-item"><span class="meta-val">4</span><span class="meta-label">Opciones c/u</span></div>
    <div class="meta-item"><span class="meta-val">∞</span><span class="meta-label">Intentos</span></div>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0 / 30</span>
</div>

<main>
  <div id="quiz"></div>

  <div class="submit-wrap">
    <button class="btn-submit" id="btnSubmit" onclick="submitQuiz()">Calificar examen</button>
  </div>

  <div id="results">
    <div class="score-ring" id="scoreRing">
      <div class="score-inner">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-denom">/30</span>
      </div>
    </div>
    <h2 id="resultsTitle">Resultado</h2>
    <p id="resultsMsg"></p>
    <button class="btn-retry" onclick="retryQuiz()">Intentar de nuevo</button>
  </div>
</main>

<script>
const questions = [
  {
    q: "¿Qué caracterizó al derecho durante el Porfiriato en México?",
    opts: [
      "Fue un derecho progresista que promovió la igualdad social y agraria",
      "Fue un sistema jurídico que protegió los intereses de las élites y legitimó la dictadura mediante leyes positivistas",
      "Garantizó los derechos laborales y la libertad de prensa de forma efectiva",
      "Estableció por primera vez el principio de división de poderes en México"
    ],
    answer: 1,
    fb: "El derecho porfirista (1876-1910) se basó en el positivismo jurídico de Auguste Comte, adoptado por los llamados 'científicos' del régimen. Sus características fueron: concentración del poder en el Ejecutivo, uso de las leyes para legitimar el despojo de tierras a comunidades indígenas y campesinas (Ley Lerdo, deslinde de terrenos baldíos), protección al capital extranjero (estadounidense, inglés, francés), represión de la libertad de prensa y de asociación, y una judicatura subordinada al poder político. Aunque existían formalmente códigos civiles y penales modernos, su aplicación era selectiva y discriminatoria. Este contexto de injusticia jurídica fue una de las causas estructurales de la Revolución Mexicana."
  },
  {
    q: "El Programa del Partido Liberal Mexicano (PLM) de 1906 demandaba, entre otras cosas:",
    opts: [
      "La reelección indefinida de Porfirio Díaz para garantizar la estabilidad",
      "La jornada laboral de 8 horas, salario mínimo y supresión de las tiendas de raya",
      "La creación de un banco central y la nacionalización del petróleo",
      "El establecimiento del fuero militar para todos los ciudadanos"
    ],
    answer: 1,
    fb: "El Programa del PLM de 1906, redactado principalmente por Ricardo Flores Magón desde el exilio en Estados Unidos, contenía demandas radicales para su época: jornada laboral máxima de 8 horas diarias, salario mínimo garantizado, prohibición del trabajo infantil menor de 14 años, supresión de las tiendas de raya (sistema que esclavizaba a los trabajadores al endeudarlos con su patrón), obligatoriedad de la instrucción laica, devolución de tierras a los pueblos despojados, y separación entre la Iglesia y el Estado. Muchas de estas demandas fueron posteriormente incorporadas en la Constitución de 1917, lo que convierte al PLM en un antecedente ideológico directo del texto constitucional vigente."
  },
  {
    q: "¿Cuál fue la importancia JURÍDICA del Plan de San Luis (1910)?",
    opts: [
      "Creó una nueva constitución que reemplazó a la de 1857",
      "Estableció el sufragio universal para hombres y mujeres",
      "Desconoció legalmente las elecciones fraudulentas y llamó a la rebelión armada, sentando base para la legitimidad revolucionaria",
      "Reconoció la validez de las leyes del Porfiriato siempre que fueran justas"
    ],
    answer: 2,
    fb: "El Plan de San Luis, proclamado por Francisco I. Madero el 5 de octubre de 1910, tuvo una doble importancia: política, porque desconoció la reelección fraudulenta de Porfirio Díaz y proclamó nulas las elecciones de 1910; y jurídica, porque convocó al pueblo mexicano a levantarse en armas el 20 de noviembre de ese año, dotando de legitimidad jurídica a la insurrección. Desde el punto de vista del derecho, este documento fue el primer acto formal de ruptura con el orden jurídico porfirista: declaró ilegítimo al gobierno existente y propuso restablecer el sufragio efectivo y la no reelección como principios fundamentales. Además, reconocía de manera incipiente el problema agrario, señalando que los propietarios despojados serían restituidos en sus tierras."
  },
  {
    q: "El Plan de Ayala (1911) fue redactado principalmente para:",
    opts: [
      "Apoyar el gobierno de Francisco I. Madero y consolidar su autoridad",
      "Desconocer a Madero y exigir la restitución de tierras a comunidades despojadas durante el Porfiriato",
      "Establecer un tratado de paz con el gobierno federal",
      "Crear un partido político que representara a los trabajadores urbanos"
    ],
    answer: 1,
    fb: "El Plan de Ayala fue proclamado por Emiliano Zapata el 28 de noviembre de 1911, desconociendo a Francisco I. Madero por considerar que había traicionado los principios agrarios de la Revolución. Sus puntos fundamentales en materia agraria fueron: la restitución inmediata de tierras, montes y aguas a los pueblos y ciudadanos despojados durante el Porfiriato; la expropiación mediante indemnización de un tercio de los monopolios de tierra para dotar a los pueblos sin ejidos; y la confiscación sin indemnización de los bienes de los 'caciques' que se opusieran al Plan. Su lema 'Tierra y Libertad' sintetizó la demanda histórica del campesinado. Los principios del Plan de Ayala influyeron directamente en la redacción del artículo 27 constitucional de 1917."
  },
  {
    q: "La Constitución de 1917 fue revolucionaria en términos de derecho social porque:",
    opts: [
      "Fue la primera del mundo en incorporar derechos sociales como trabajo, educación y reforma agraria en un texto constitucional",
      "Copió íntegramente el modelo constitucional estadounidense de 1787",
      "Eliminó todos los derechos individuales para dar paso a los derechos colectivos",
      "Solo reconoció derechos civiles y políticos, dejando los sociales para leyes secundarias"
    ],
    answer: 0,
    fb: "La Constitución promulgada el 5 de febrero de 1917 en Querétaro fue reconocida internacionalmente como la primera Constitución del mundo en incorporar derechos sociales con rango constitucional, adelantándose incluso a la Constitución de Weimar (Alemania, 1919). Sus artículos fundamentales fueron: el 3° (educación laica, gratuita y obligatoria), el 27° (propiedad originaria de la nación sobre tierras y aguas, base de la reforma agraria y la expropiación petrolera de 1938) y el 123° (derechos laborales: jornada de 8 horas, salario mínimo, derecho a huelga, protección a la maternidad, seguridad social). Esta Constitución inauguró el concepto de 'derecho social' como rama autónoma del derecho, diferente al derecho civil individual y al derecho público clásico."
  },
  {
    q: "¿Cuál de las siguientes fue una reforma laboral directamente derivada del artículo 123 constitucional de 1917?",
    opts: [
      "La creación del IMSS en 1917 mismo",
      "El reconocimiento del derecho a huelga, jornada máxima de 8 horas y protección a la maternidad",
      "La prohibición total de sindicatos para evitar la inestabilidad política",
      "La nacionalización inmediata de todas las empresas extranjeras en México"
    ],
    answer: 1,
    fb: "El artículo 123 de la Constitución de 1917 estableció un catálogo amplio de derechos laborales: jornada máxima de 8 horas diurnas (7 nocturnas), descanso semanal obligatorio, protección especial para mujeres embarazadas y menores de edad, salario mínimo suficiente, participación de utilidades, derecho de asociación sindical y de huelga, indemnización por despido injustificado, y la obligación patronal de proporcionar habitaciones cómodas e higiénicas. Este artículo fue la base sobre la que se creó la Ley Federal del Trabajo de 1931 y, posteriormente, el Instituto Mexicano del Seguro Social (IMSS) en 1943. Representó el reconocimiento constitucional de la desigualdad estructural entre trabajadores y patrones, y la intervención del Estado para equilibrarla."
  },
  {
    q: "El derecho OBJETIVO se diferencia del derecho SUBJETIVO en que:",
    opts: [
      "El derecho objetivo son las facultades del individuo; el subjetivo son las normas vigentes",
      "El derecho objetivo es el conjunto de normas jurídicas vigentes; el subjetivo es la facultad o poder que esas normas otorgan a las personas",
      "Ambos términos son sinónimos en la doctrina jurídica mexicana",
      "El derecho subjetivo solo existe en el derecho penal, no en el civil"
    ],
    answer: 1,
    fb: "Esta distinción es fundamental en la teoría general del derecho. El derecho OBJETIVO (también llamado derecho positivo) es el conjunto de normas jurídicas vigentes en un Estado: la Constitución, los códigos, las leyes, los reglamentos. Es externo al sujeto, existe independientemente de él. El derecho SUBJETIVO, en cambio, es la facultad, poder o prerrogativa que esas normas reconocen y otorgan a una persona determinada: el derecho de propiedad, el derecho a la educación, el derecho a contraer matrimonio. La ciencia del derecho, por su parte, es la disciplina académica que estudia y sistematiza el derecho objetivo. La trampa clásica es invertir las definiciones: mucha gente confunde 'subjetivo' con 'personal/individual' pero en sentido técnico significa 'perteneciente a un sujeto jurídico'."
  },
  {
    q: "Las fuentes HISTÓRICAS del derecho son importantes porque:",
    opts: [
      "Son las únicas fuentes obligatorias para los jueces mexicanos",
      "Permiten conocer el origen y evolución de las instituciones jurídicas, ayudando a interpretar el derecho vigente",
      "Reemplazan a la legislación cuando existe un vacío legal",
      "Solo tienen relevancia académica y no tienen ningún impacto en la práctica jurídica"
    ],
    answer: 1,
    fb: "Las fuentes históricas del derecho son los documentos, textos, monumentos y vestigios que permiten conocer el derecho del pasado: las Siete Partidas de Alfonso X, las Leyes de Indias, las Constituciones anteriores a la vigente, los proyectos de codificación del siglo XIX, etc. Su importancia es triple: primero, permiten entender el origen y evolución de las instituciones jurídicas actuales (por ejemplo, entender el artículo 27 constitucional requiere conocer la historia del ejido y la hacienda); segundo, sirven como herramienta de interpretación histórica cuando el texto legal es oscuro o ambiguo; y tercero, permiten identificar qué problemas sociales motivaron la creación de determinadas normas, lo que ayuda al operador jurídico a aplicarlas correctamente. Son distintas de las fuentes formales, que crean derecho vigente, y de las fuentes materiales, que explican por qué se crea."
  },
  {
    q: "Las fuentes REALES o materiales del derecho son:",
    opts: [
      "Los textos legales codificados como el Código Civil y el Código Penal",
      "Los factores económicos, sociales, políticos e históricos que determinan el contenido de las normas jurídicas",
      "Las sentencias de la Suprema Corte de Justicia de la Nación",
      "Los libros y manuales de derecho escritos por juristas reconocidos"
    ],
    answer: 1,
    fb: "Las fuentes reales o materiales son los factores de la realidad social, económica, política, cultural e histórica que determinan el contenido concreto de las normas jurídicas. Responden a la pregunta '¿por qué existe esta norma?'. Por ejemplo: la crisis agraria del Porfiriato (factor material) fue lo que determinó el contenido del artículo 27 constitucional; la explotación laboral industrial fue la fuente material del artículo 123. Se distinguen de las fuentes formales (que indican cómo se crea el derecho) y de las históricas (que muestran su evolución). Los iusnaturalistas agregan también fuentes ideales (valores, principios de justicia) como factores que moldean el contenido normativo. Comprender las fuentes materiales permite al jurista entender la ratio legis, es decir, la razón o finalidad de la ley."
  },
  {
    q: "¿Cuál de las siguientes es considerada una fuente FORMAL del derecho?",
    opts: [
      "La opinión pública sobre un tema jurídico",
      "Un artículo académico publicado por un catedrático de derecho",
      "La legislación, la costumbre jurídica y la jurisprudencia",
      "Los valores morales de la sociedad en general"

    fb: "Antes de la reforma judicial de 2024, el CJF se integraba por 7 consejeros: (1) El presidente de la Suprema Corte de Justicia de la Nación, quien también presidía el CJF; (2) Tres consejeros designados por el Pleno de la SCJN, provenientes de la carrera judicial (magistrados o jueces federales); (3) Dos consejeros designados por el Senado de la República; (4) Un consejero designado por el presidente de la República. Esta composición buscaba un equilibrio entre los tres poderes, aunque en la práctica fue objeto de críticas por la influencia que el Poder Judicial tenía sobre su propio órgano de control (cuatro de los siete integrantes eran designados por la propia SCJN o provenían de la carrera judicial). Los consejeros duraban cinco años en su cargo, con posibilidad de una sola reelección."
  },
  {
    q: "¿Cuál era una crítica central al Poder Judicial Federal en México, según los análisis doctrinales?",
    opts: [
      "Que los jueces trabajaban demasiado y los procesos eran excesivamente rápidos",
      "Falta de independencia real, nepotismo, corrupción, opacidad en nombramientos y desigualdad en el acceso a la justicia",
      "Que existían demasiados jueces federales para la carga de trabajo existente",
      "Que las sentencias de la SCJN eran demasiado progresistas y afectaban la estabilidad jurídica"
    ],
    answer: 1,
    fb: "Los estudios académicos y diagnósticos institucionales sobre el Poder Judicial Federal mexicano identificaron múltiples problemas estructurales: (1) Falta de independencia real frente al Ejecutivo, especialmente en sexenios anteriores donde las decisiones de la SCJN favorecían sistemáticamente al gobierno; (2) Nepotismo y endogamia: los nombramientos de jueces y magistrados respondían frecuentemente a relaciones familiares o de lealtad personal dentro del propio PJF, no a méritos objetivos; (3) Corrupción: casos documentados de jueces que recibían pagos para resolver a favor de determinadas partes, incluyendo cárteles del crimen organizado; (4) Opacidad en el CJF: los procedimientos disciplinarios contra jueces eran opacos y raramente resultaban en sanciones efectivas; (5) Desigualdad en el acceso a la justicia: el costo económico, la complejidad técnica y las barreras geográficas impedían a personas de escasos recursos acceder efectivamente al sistema judicial federal. Estas críticas fueron el argumento central para justificar la reforma judicial de 2024."
  }
];

let answered = {};
let score = 0;

function renderQuiz() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const letters = ['A', 'B', 'C', 'D'];
    const optsHTML = q.opts.map((o, j) => `
      <div class="option" id="opt-${i}-${j}" onclick="selectOption(${i}, ${j})">
        <span class="opt-letter">${letters[j]}</span>
        <span class="opt-text">${o}</span>
      </div>
    `).join('');
    container.innerHTML += `
      <div class="question-card" id="card-${i}" style="animation-delay:${i*0.04}s">
        <div class="q-header">
          <div class="q-num">${i+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="options" id="opts-${i}">${optsHTML}</div>
        <div class="feedback" id="fb-${i}"></div>
      </div>
    `;
  });
  updateProgress();
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx] !== undefined) return;
  answered[qIdx] = optIdx;
  const q = questions[qIdx];
  const opts = document.querySelectorAll(`#opts-${qIdx} .option`);
  opts.forEach(o => o.classList.add('disabled'));
  const fb = document.getElementById(`fb-${qIdx}`);
  if (optIdx === q.answer) {
    document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>✓ ¡Correcto!</strong> ${q.fb}`;
    score++;
  } else {
    document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('wrong');
    document.getElementById(`opt-${qIdx}-${q.answer}`).classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>✗ Incorrecto.</strong> ${q.fb}`;
  }
  updateProgress();
  if (Object.keys(answered).length === questions.length) {
    setTimeout(() => {
      document.getElementById('btnSubmit').style.display = 'none';
      showResults(score);
    }, 600);
  }
}

function updateProgress() {
  const n = Object.keys(answered).length;
  document.getElementById('progressFill').style.width = (n/30*100) + '%';
  document.getElementById('progressText').textContent = n + ' / 30';
}

function submitQuiz() {
  const n = Object.keys(answered).length;
  if (n < 30) {
    const unanswered = [];
    for (let i=0; i<30; i++) { if (answered[i] === undefined) unanswered.push(i+1); }
    alert(`Te faltan ${30-n} pregunta(s) por responder: #${unanswered.slice(0,5).join(', ')}${unanswered.length>5?' ...':''}`);
    return;
  }
  document.getElementById('btnSubmit').style.display = 'none';
  showResults(score);
}

function showResults(score) {
  const pct = Math.round(score/30*100);
  const ring = document.getElementById('scoreRing');
  ring.style.setProperty('--pct', pct + '%');
  document.getElementById('scoreNum').textContent = score;
  const title = pct >= 80 ? '¡Excelente trabajo!' : pct >= 60 ? 'Buen esfuerzo' : 'Sigue practicando';
  const msg = pct >= 80
    ? `Obtuviste ${score}/30 (${pct}%). Dominas muy bien los temas del segundo parcial.`
    : pct >= 60
    ? `Obtuviste ${score}/30 (${pct}%). Revisa los temas donde fallaste y vuelve a intentarlo.`
    : `Obtuviste ${score}/30 (${pct}%). Te recomendamos repasar los temas a fondo antes del examen.`;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsMsg').textContent = msg;
  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('show');
  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryQuiz() {
  answered = {};
  score = 0;
  document.getElementById('btnSubmit').style.display = '';
  document.getElementById('results').classList.remove('show');
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>
